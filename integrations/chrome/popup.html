<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AppLogs</title>
  <style>
    body {
      width: 400px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
    }
    #stats {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    #logs {
      max-height: 300px;
      overflow-y: auto;
      background: #fafafa;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }
    .log-entry {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .log-type {
      font-weight: bold;
      color: #0066cc;
    }
    .log-timestamp {
      color: #666;
      font-size: 10px;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 5px;
    }
    button:hover {
      background: #0052a3;
    }
    button#clear {
      background: #888;
    }
    button#clear:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <h2>AppLogs Collector</h2>
  
  <div id="stats">
    <strong>Native host:</strong> <span id="native-status" style="font-weight:bold;">Checking...</span><br>
    <strong>Storage logs:</strong> <span id="count">0</span>
  </div>
  
  <div>
    <button id="refresh">Refresh</button>
    <button id="clear">Clear Storage</button>
  </div>
  
  <div style="margin-top:15px;font-size:11px;color:#666;">
    Logs are written automatically to<br>
    <code>~/.applogs/logs/chrome-events.jsonl</code><br>
    via native messaging host.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
